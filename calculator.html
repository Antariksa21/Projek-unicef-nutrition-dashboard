<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NeoCalc - Premium Glassmorphic Calculator</title>
    <meta name="description" content="A gorgeous, responsive, glassmorphic calculator with full keyboard support.">
    <link rel="stylesheet" href="calculator.css">
</head>
<body>

    <!-- Ambient background glow elements -->
    <div class="ambient-orbs">
        <div class="orb orb-1"></div>
        <div class="orb orb-2"></div>
    </div>

    <!-- Calculator Container -->
    <main class="calculator glass-panel">
        <!-- Brand/Header -->
        <header class="calc-header">
            <span class="brand-name">NEOCALC</span>
            <div class="header-dots">
                <span class="dot red"></span>
                <span class="dot yellow"></span>
                <span class="dot green"></span>
            </div>
        </header>

        <!-- Display Area -->
        <section class="display" aria-live="polite">
            <div class="history-line" id="history-display"></div>
            <div class="input-line" id="input-display">0</div>
        </section>

        <!-- Keypad Area -->
        <section class="keypad">
            <!-- Row 1 -->
            <button class="btn action-btn" data-key="clear">AC</button>
            <button class="btn action-btn" data-key="backspace">⌫</button>
            <button class="btn action-btn" data-key="percentage">%</button>
            <button class="btn operator-btn" data-key="divide">÷</button>

            <!-- Row 2 -->
            <button class="btn num-btn" data-key="7">7</button>
            <button class="btn num-btn" data-key="8">8</button>
            <button class="btn num-btn" data-key="9">9</button>
            <button class="btn operator-btn" data-key="multiply">×</button>

            <!-- Row 3 -->
            <button class="btn num-btn" data-key="4">4</button>
            <button class="btn num-btn" data-key="5">5</button>
            <button class="btn num-btn" data-key="6">6</button>
            <button class="btn operator-btn" data-key="subtract">−</button>

            <!-- Row 4 -->
            <button class="btn num-btn" data-key="1">1</button>
            <button class="btn num-btn" data-key="2">2</button>
            <button class="btn num-btn" data-key="3">3</button>
            <button class="btn operator-btn" data-key="add">+</button>

            <!-- Row 5 -->
            <button class="btn action-btn toggle-sign" data-key="toggle-sign">±</button>
            <button class="btn num-btn" data-key="0">0</button>
            <button class="btn num-btn" data-key="decimal">.</button>
            <button class="btn equals-btn" data-key="equals">=</button>
        </section>
    </main>

    <!-- Brief footer -->
    <footer class="calc-footer">
        <span>Press keys on your keyboard to type</span>
    </footer>

    <script src="calculator.js"></script>
</body>
</html>
